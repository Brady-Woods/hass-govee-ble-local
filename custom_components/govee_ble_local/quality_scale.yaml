# Home Assistant Integration Quality Scale tracking for govee_ble_local.
# https://developers.home-assistant.io/docs/core/integration-quality-scale/
#
# Note: this is a custom component. The official quality-scale tier is only
# validated/awarded for integrations merged into HA core; here this file is a
# self-assessment against the same rules. Everything targets the Platinum
# technical bar.

rules:
  # ------------------------------------------------------------------ Bronze
  action-setup:
    status: exempt
    comment: Integration registers no custom service actions.
  appropriate-polling: done
  brands:
    status: todo
    comment: >
      Achievable for a custom component: add icon.png/logo.png under
      custom_integrations/govee_ble_local in home-assistant/brands (or, on HA
      2026.3+, bundle brand icons in the integration). Not yet done - needs
      brand image assets.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: done
    comment: >
      Full config-flow coverage (bluetooth discovery, user, and reconfigure
      steps plus not_supported/already_configured/no_devices/not_found aborts)
      via pytest-homeassistant-custom-component; see tests/test_config_flow.py.
  dependency-transparency:
    status: done
    comment: >
      The sole dependency (govee-ble-local) is open source (MIT) with its full
      source publicly reviewable on GitHub. It is currently installed via git
      URL rather than a pinned PyPI release; publishing to PyPI would be
      required for HA core submission but is not needed for HACS/custom-
      component distribution.
  docs-actions:
    status: exempt
    comment: No custom service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: >
      Setup is from passive BLE discovery (or a picker of already-discovered
      devices), which already implies the device is advertising and reachable;
      there is no host/credential to validate before creating the entry.
  test-before-setup: done
  unique-config-entry: done

  # ------------------------------------------------------------------ Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration has no configuration parameters.
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: The device uses a fixed protocol PSK; there is no user auth to renew.
  test-coverage:
    status: done
    comment: >
      100% line coverage of the HA-facing layer (init/setup, coordinator,
      light, switch, entity, diagnostics, config flow) via
      pytest-homeassistant-custom-component; see tests/. The BLE protocol and
      device-profile layers are tested separately in the govee-ble-local
      library (40 tests).

  # -------------------------------------------------------------------- Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: One physical device per config entry; there is no hub enumerating devices.
  entity-category:
    status: exempt
    comment: All entities are primary controls; none are diagnostic/config entities.
  entity-device-class:
    status: exempt
    comment: No applicable device class for the light or the zone on/off switches.
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: >
      Failure modes (device out of range, transient BLE errors) are handled by
      graceful unavailability and coordinator backoff; there is no distinct,
      user-actionable repair condition to surface.
  stale-devices:
    status: exempt
    comment: One device per entry; removing the entry removes the device.

  # ---------------------------------------------------------------- Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: BLE-only integration; it makes no HTTP requests, so there is no web session to inject.
  strict-typing:
    status: done
    comment: >
      Fully typed with a shipped py.typed; verified with mypy under a config
      mirroring Home Assistant core's own strict settings (see mypy.ini). The
      govee-ble-local dependency also ships py.typed and passes mypy --strict.
