# Mirrors Home Assistant core's own mypy configuration so `strict-typing`
# is verified against the same bar core applies to built-in integrations.
# Run:  mypy custom_components/govee_h60a6
[mypy]
# No python_version pin: mypy targets the interpreter it runs under, so it
# always parses the installed Home Assistant's source (whose syntax tracks the
# Python it's installed under - e.g. HA 2026.7 uses 3.14-only syntax).
platform = linux
follow_imports = normal
local_partial_types = True
strict_equality = True
strict_bytes = True
no_implicit_optional = True
warn_incomplete_stub = True
warn_redundant_casts = True
warn_unused_configs = True
warn_unused_ignores = True
enable_error_code = ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = True
check_untyped_defs = True
disallow_any_generics = True
disallow_incomplete_defs = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_untyped_defs = True
warn_return_any = True
warn_unreachable = True

# custom_components/ is a namespace package (no __init__.py at that level).
namespace_packages = True
explicit_package_bases = True
mypy_path = .

# Test files are not held to the strict-typing bar in HA core; they live
# outside the shipped package (see tests/).
exclude = (?x)(/test_.*\.py$)
